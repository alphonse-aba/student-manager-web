html<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Événements Souris</title>
  <style>
    #maBoite {
      width: 200px;
      height: 200px;
      background-color: blue;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <div id="maBoite">Survole-moi !</div>
  <p id="message"></p>

  <script>
    let boite = document.querySelector("#maBoite");
    let message = document.querySelector("#message");

    // Souris entre dans la boite
    boite.addEventListener("mouseover", function() {
      boite.style.backgroundColor = "red";
      message.textContent = "La souris est entrée !";
    });

    // Souris quitte la boite
    boite.addEventListener("mouseout", function() {
      boite.style.backgroundColor = "blue";
      message.textContent = "La souris est sortie !";
    });

  </script>

</body>
</html>

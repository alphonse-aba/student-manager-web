<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>
<body style="background-color: #f0f2f5; font-family: Arial, sans-serif; text-align: center; padding-top: 100px;">

    <h1 style="color: #1877f2;">🔐 Connexion</h1>

    {% if erreur %}
        <p style="color: red;">{{ erreur }}</p>
    {% endif %}

    <form method="POST" style="display: inline-block; text-align: left;">
        <div style="margin-bottom: 15px;">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required
                style="padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 250px;">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="password" name="password" placeholder="Mot de passe" required
                style="padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 250px;">
        </div>
        <button type="submit"
            style="padding: 10px 30px; font-size: 16px; background-color: #1877f2; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%;">
            Se connecter
        </button>
    </form>

</body>
</html>
